    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      width: min(1400px, calc(100% - 80px));
      min-height: 100vh;
      margin: 0 auto;
      padding: 40px 0 70px;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      min-height: 84px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 30px;
    }

    .brand {
      width: 112px;
      display: block;
      flex: 0 0 auto;
    }

    .brand img {
      width: 100%;
      height: auto;
      display: block;
      filter: brightness(0) invert(1);
      image-rendering: pixelated;
    }

    .top-text {
      margin-top: 8px;
      font-family: var(--font-title);
      font-size: 11px;
      line-height: 1;
      font-weight: 400;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      color: var(--cyan);
    }

    .cards-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(100px, 18vh, 190px) 0 74px;
    }

    .cards {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: clamp(56px, 5vw, 96px);
      align-items: center;
    }

    .card {
      position: relative;
      min-height: clamp(180px, 20vw, 250px);
      padding: 22px 20px 24px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
      border: 1px solid var(--cyan);
      background: rgba(0, 0, 0, 0.78);
      transform: scale(1);
      transition:
        transform 0.28s ease,
        box-shadow 0.28s ease,
        background 0.28s ease,
        border-color 0.28s ease;
    }

    .card:hover,
    .card:focus-visible {
      background: rgba(8, 18, 18, 0.88);
      border-color: rgba(228, 255, 20, 0.85);
      transform: translateY(-4px) scale(1.02);
      box-shadow:
        0 0 0 1px rgba(228, 255, 20, 0.08),
        0 0 22px rgba(228, 255, 20, 0.12),
        0 10px 28px rgba(0, 0, 0, 0.42);
      outline: none;
    }

    .card-label {
      font-family: var(--font-title);
      font-size: 11px;
      line-height: 1;
      font-weight: 400;
      text-transform: uppercase;
      color: var(--cyan);
    }

    .card-title {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 20px;
      font-size: clamp(28px, 3vw, 43px);
      line-height: 0.95;
      font-weight: 300;
      text-transform: uppercase;
      letter-spacing: -0.045em;
    }

    .card-title strong {
      font-weight: 300;
    }

    .arrow {
      width: clamp(30px, 2.7vw, 42px);
      height: clamp(30px, 2.7vw, 42px);
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.28s ease, filter 0.28s ease;
    }

    .arrow svg {
      width: 100%;
      height: 100%;
      display: block;
      overflow: visible;
    }

    .arrow path {
      fill: none;
      stroke: currentColor;
